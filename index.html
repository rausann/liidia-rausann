<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>For You</title>
    <style>
      :root {
        --rose: #ff5f8f;
        --cream: #fff7f2;
        --wine: #3f0d28;
        --glass: rgba(255, 255, 255, 0.28);
        --line: rgba(255, 255, 255, 0.42);
        --shadow: 0 30px 80px rgba(139, 23, 71, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--wine);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.8), transparent 24%),
          radial-gradient(circle at 82% 12%, rgba(255, 95, 143, 0.34), transparent 28%),
          linear-gradient(135deg, #fff0f5, #ffd1dc 48%, #ffe8c7);
      }

      body::before,
      body::after {
        content: "♥";
        position: fixed;
        color: rgba(255, 95, 143, 0.18);
        font-size: clamp(9rem, 18vw, 18rem);
        pointer-events: none;
        animation: drift 9s ease-in-out infinite;
      }

      body::before {
        left: -34px;
        top: 8%;
      }

      body::after {
        right: -22px;
        bottom: 2%;
        animation-delay: -4s;
      }

      .page-shell {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: clamp(24px, 5vw, 72px);
      }

      .page {
        width: min(920px, 100%);
      }

      .page[hidden] {
        display: none;
      }

      .love-card,
      .reaction-card {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--glass);
        box-shadow: var(--shadow);
        text-align: center;
        backdrop-filter: blur(22px);
      }

      .love-card {
        position: relative;
        overflow: hidden;
        padding: clamp(34px, 7vw, 76px);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--rose);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 18px;
        font-size: clamp(4rem, 12vw, 8.8rem);
        line-height: 0.9;
      }

      h2 {
        margin-bottom: 12px;
        font-size: clamp(3rem, 8vw, 6.4rem);
        line-height: 0.95;
      }

      .message,
      .reaction-card > p {
        max-width: 56ch;
        margin-inline: auto;
        color: rgba(63, 13, 40, 0.76);
        font-size: 1.08rem;
        line-height: 1.75;
      }

      .actions {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
        min-height: 92px;
        margin-top: 34px;
      }

      .btn {
        min-width: 150px;
        min-height: 52px;
        padding: 0 22px;
        border: 0;
        border-radius: 999px;
        color: white;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 16px 34px rgba(139, 23, 71, 0.22);
        transition:
          transform 220ms ease,
          box-shadow 220ms ease,
          left 220ms ease,
          top 220ms ease;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 22px 44px rgba(139, 23, 71, 0.28);
      }

      .reject-btn {
        position: relative;
        touch-action: none;
        background: linear-gradient(135deg, #9b8aa0, #6f5d74);
      }

      .reject-btn.escape {
        position: absolute;
      }

      .love-btn {
        background: linear-gradient(135deg, var(--rose), #ff8ab3);
      }

      .reaction-card {
        display: grid;
        gap: 18px;
        padding: clamp(24px, 5vw, 42px);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }

      .gallery img {
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 20px;
        background:
          linear-gradient(135deg, rgba(255, 95, 143, 0.2), rgba(255, 255, 255, 0.45)),
          var(--cream);
        box-shadow: 0 16px 32px rgba(139, 23, 71, 0.16);
      }

      .music {
        width: min(520px, 100%);
        margin-inline: auto;
      }

      .heart {
        position: fixed;
        left: var(--x);
        bottom: -30px;
        color: var(--rose);
        font-size: var(--size);
        pointer-events: none;
        animation: rise 3.8s ease-in forwards;
      }

      @keyframes drift {
        0%,
        100% {
          transform: translateY(0) rotate(-6deg);
        }
        50% {
          transform: translateY(-18px) rotate(6deg);
        }
      }

      @keyframes rise {
        to {
          transform: translateY(-110vh) rotate(30deg);
          opacity: 0;
        }
      }

      @media (max-width: 640px) {
        .page-shell {
          padding: 18px;
        }

        .love-card,
        .reaction-card {
          border-radius: 22px;
        }

        .actions {
          min-height: 160px;
        }

        .btn {
          width: 100%;
        }

        .reject-btn.escape {
          width: auto;
        }

        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="page" id="pageOne">
        <section class="love-card" aria-labelledby="love-title">
          <p class="eyebrow">saya ma'un bilang sesuatu</p>
          <h1 id="love-title">I love you</h1>
          <p class="message">
            Setiap momen kecil terasa lebih lembut, lebih cerah, dan lebih manis ketika bersamamu.
          </p>

          <div class="actions" aria-label="Choose your answer">
            <button class="btn reject-btn" type="button">oh</button>
            <button class="btn love-btn" type="button">I love you more</button>
          </div>
        </section>
      </div>

      <div class="page" id="pageTwo" hidden>
        <section class="reaction-card" aria-live="polite">
          <p class="eyebrow">lihat dan dengar nihh😒</p>
          <h2>makaci</h2>
          <div class="gallery">
            <img src="images/your-photo-1.jpg" alt="Romantic memory placeholder 1" />
            <img src="images/your-photo-2.jpg" alt="Romantic memory placeholder 2" />
            <img src="images/your-photo-3.jpg" alt="Romantic memory placeholder 3" />
          </div>

          <audio class="music" controls loop preload="auto">
            <source src="music/your-romantic-song.mp3" type="audio/mpeg" />
          </audio>
        </section>
      </div>
    </main>

    <script>
      const pageOne = document.querySelector("#pageOne");
      const pageTwo = document.querySelector("#pageTwo");
      const rejectButton = document.querySelector(".reject-btn");
      const loveButton = document.querySelector(".love-btn");
      const music = document.querySelector(".music");

      function moveRejectButton() {
        const actions = document.querySelector(".actions");
        const buttonRect = rejectButton.getBoundingClientRect();
        const actionsRect = actions.getBoundingClientRect();

        rejectButton.classList.add("escape");

        const maxX = Math.max(0, actionsRect.width - buttonRect.width);
        const maxY = Math.max(0, actionsRect.height - buttonRect.height);
        const nextX = Math.random() * maxX;
        const nextY = Math.random() * maxY;

        rejectButton.style.left = `${nextX}px`;
        rejectButton.style.top = `${nextY}px`;
      }

      function createHeart() {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = "♥";
        heart.style.setProperty("--x", `${Math.random() * 100}vw`);
        heart.style.setProperty("--size", `${Math.random() * 22 + 16}px`);

        document.body.appendChild(heart);
        window.setTimeout(() => heart.remove(), 4000);
      }

      function showPageTwo() {
        pageOne.hidden = true;
        pageTwo.hidden = false;

        for (let index = 0; index < 36; index += 1) {
          window.setTimeout(createHeart, index * 90);
        }

        music.currentTime = 0;
        music.volume = 0.85;
        music.play().catch(() => {
          music.controls = true;
        });
      }

      rejectButton.addEventListener("mouseenter", moveRejectButton);
      rejectButton.addEventListener("focus", moveRejectButton);
      rejectButton.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "touch" || event.pointerType === "pen") {
          event.preventDefault();
          moveRejectButton();
        }
      });
      rejectButton.addEventListener(
        "touchstart",
        (event) => {
          event.preventDefault();
          moveRejectButton();
        },
        { passive: false }
      );
      rejectButton.addEventListener("click", (event) => {
        event.preventDefault();
        moveRejectButton();
      });

      loveButton.addEventListener("click", showPageTwo);
    </script>
  </body>
</html>
